name: night
runtime_mode: research
model_path: models/baseline.pt  # production slot: models/night_model.pt (once night-specialized model accepted)
device: mps
imgsz: 960
conf_thresh: 0.12
small_target_mode: true
adaptive_scan_enabled: true
global_scan_interval: 5
lock_tracker_enabled: true
night_enabled: true
roi_assist_enabled: true
roi_conf_thresh: 0.10
night_mot_thresh: 14
night_diff_thresh: 10
class_ema_alpha: 0.15  # [night hardening] slower EMA (was 0.22), reduces score volatility
drone_lock_score_min: 0.64  # [night hardening] raised from 0.58
drone_reacquire_score_min: 0.52  # [night hardening] raised from 0.45
lock_confirm_frames: 7  # [night hardening] raised from default 5
lock_lost_grace: 1      # [night hardening] reduced from default 2
lock_mode_release_frames: 4  # [night hardening] faster release (was default 6)
lock_reacquire_dist: 90      # [night hardening] tighter spatial gate (was default 120)
active_id_switch_cooldown_frames: 60  # [night hardening] double cooldown (was default 30)
track_state_acquire_frames: 4  # [night hardening] require 4 hits to acquire track (was default 3)
lock_mode_acquire_frames: 3  # [night hardening] require 3 confirm-frames to enter lock (was default 2)
active_id_switch_allow_if_lost_frames: 12  # [night hardening] longer loss before ID-switch (was default 6)
track_state_lost_frames: 12  # [night hardening] hold track 12 frames before LOST (was default 8)
lock_tracker_min_score: 0.52  # [night hardening] stricter correlation gate (was default 0.42)
velocity_alpha: 0.68
lock_reacquire_predict_gain: 1.12
lock_reacquire_predict_horizon_max: 5
local_small_box_area: 1500
local_small_box_ratio: 0.0035
local_small_img_size: 960
local_small_conf: 0.07
local_boost_lock_score_thresh: 0.60
night_run_when_primary_seen: false
night_primary_cooldown: 3
display_min_hit_streak_night: 4
display_max_lost_frames: 1
budget_enabled: true
budget_target_fps: 22.0
budget_high_load: 1.15
budget_low_load: 0.80
budget_level_max: 2
budget_roi_min_candidates: 1
budget_night_skip_level1: 2
budget_night_skip_level2: 3
budget_roi_skip_level2: 2
show_gt_overlay: true
show_debug_timings: true
show_trails: true
# [night detector — large target] AP-024
night_max_area: 220      # default 200: minimal raise for large-drone blobs
night_track_dist: 65     # default 42: wider spatial gate — primary id_chg driver
night_lost_max: 8        # default 8: kept at default to prevent false_lock regression
# [night detector — continuity gating] AP-025
night_confirm: 5         # default 3: require 5 consecutive frames to establish night detection
