name: antiuav_thermal
runtime_mode: research
model_path: models/baseline.pt  # production slot: models/ir_model.pt (once IR-specialized model accepted)
device: mps
imgsz: 960
conf_thresh: 0.12
small_target_mode: true
adaptive_scan_enabled: true
global_scan_interval: 5
local_validate_interval: 3
lock_tracker_enabled: true
lock_tracker_min_score: 0.38
lock_tracker_search_scale: 3.4
class_ema_alpha: 0.24
drone_lock_score_min: 0.60  # [ir hardening] raised from 0.56
drone_reacquire_score_min: 0.48  # [ir hardening] raised from 0.42
lock_confirm_frames: 7  # [ir hardening] raised from default 5
lock_lost_grace: 1      # [ir hardening] reduced from default 2
lock_mode_release_frames: 4  # [ir hardening] faster release (was default 6)
lock_reacquire_dist: 90      # [ir hardening] tighter spatial gate (was default 120)
velocity_alpha: 0.72
lock_reacquire_predict_gain: 1.15
lock_reacquire_predict_horizon_max: 5
local_small_box_area: 1700
local_small_box_ratio: 0.0038
local_small_img_size: 960
local_small_conf: 0.06
local_boost_lock_score_thresh: 0.62
night_run_when_primary_seen: false
night_primary_cooldown: 2
display_min_hit_streak_night: 4
display_max_lost_frames: 1
budget_enabled: true
budget_target_fps: 20.0
budget_high_load: 1.12
budget_low_load: 0.78
budget_level_max: 2
budget_roi_min_candidates: 1
budget_night_skip_level1: 2
budget_night_skip_level2: 3
budget_roi_skip_level2: 2
# [IR hardening — id_chg reduction] session-2026-03-13
active_id_switch_cooldown_frames: 60   # default 30: double cooldown between ID switches
track_state_acquire_frames: 4          # default 3: require 4 consecutive hits to acquire track
lock_mode_acquire_frames: 3            # default 2: require 3 confirm-frames to enter lock mode
active_id_switch_allow_if_lost_frames: 12  # default 6: hold longer before cooldown bypass
# [IR hardening v2 — track persistence — REVERTED] session-2026-03-14
# track_state_lost_frames tested at 12 and 16: zero effect (id_chg=63.26 unchanged)
# Root cause confirmed: YOLO detection gaps > 16 frames on Demo_IR_DRONE_146
# Runtime lever exhausted — requires IR-specialized model
show_gt_overlay: true
show_debug_timings: true
show_trails: true
night_enabled: true
roi_assist_enabled: true
roi_conf_thresh: 0.10
night_mot_thresh: 14
night_diff_thresh: 10
