name: Free CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check (if source dirs exist)
        shell: bash
        run: |
          set -euo pipefail
          targets=()
          for d in python_scripts src app; do
            if [ -d "$d" ]; then
              targets+=("$d")
            fi
          done

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No Python source directories found; skipping."
            exit 0
          fi

          python -m compileall -q "${targets[@]}"

      - name: Orchestrator state consistency
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "orchestrator/scripts/check_orchestration_state.py" ]; then
            python orchestrator/scripts/check_orchestration_state.py
          else
            echo "No orchestrator consistency check script found; skipping."
          fi
